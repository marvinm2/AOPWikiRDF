name: Turtle File Quality Control

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:
  workflow_run:
    workflows: [RDF Generation]
    types:
      - completed

jobs:
  quality-control:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Check out the repository
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need HEAD~1 so the delta guard (Step 5b) can use the previous
          # committed data/*.ttl as its week-over-week baseline.
          fetch-depth: 2

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install rdflib
          sudo apt-get update && sudo apt-get install -y raptor2-utils

      # Step 4: Strict validation with rapper (Raptor)
      - name: Validate with rapper (strict)
        run: |
          echo "=== Strict Turtle Validation (rapper) ==="
          all_valid=true
          for file in data/AOPWikiRDF.ttl data/AOPWikiRDF-Enriched.ttl data/AOPWikiRDF-Genes.ttl data/AOPWikiRDF-Void.ttl; do
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              all_valid=false
              continue
            fi
            output=$(rapper -i turtle -c "$file" 2>&1)
            triples=$(echo "$output" | grep -oP 'returned \K\d+')
            if echo "$output" | grep -q "Error"; then
              echo "FAIL: $file"
              echo "$output" | grep "Error"
              all_valid=false
            else
              echo "OK: $file ($triples triples)"
            fi
          done
          if [ "$all_valid" = false ]; then
            echo "Strict validation failed"
            exit 1
          fi

      # Step 5: Validation with rdflib + triple count checks
      - name: Validate with rdflib
        timeout-minutes: 15
        run: |
          cat > validate_ttl.py << 'PYEOF'
          import sys
          from rdflib import Graph

          MIN_TRIPLES = {
              'data/AOPWikiRDF.ttl': 50000,
              'data/AOPWikiRDF-Enriched.ttl': 1000,
              'data/AOPWikiRDF-Genes.ttl': 10000,
              'data/AOPWikiRDF-Void.ttl': 10,
          }

          def validate_turtle(file_path):
              try:
                  g = Graph()
                  g.parse(file_path, format='turtle')
                  count = len(g)
                  min_expected = MIN_TRIPLES.get(file_path, 0)
                  if count < min_expected:
                      print(f'WARN: {file_path}: only {count:,} triples (expected >= {min_expected:,})', file=sys.stderr)
                      return False, count
                  print(f'{file_path}: valid ({count:,} triples)')
                  return True, count
              except Exception as e:
                  print(f'ERROR: {file_path}: {e}', file=sys.stderr)
                  return False, 0

          if __name__ == '__main__':
              files = sys.argv[1:]
              total = 0
              all_valid = True
              for f in files:
                  valid, count = validate_turtle(f)
                  total += count
                  all_valid = all_valid and valid

              print(f'\nTotal triples: {total:,}')

              with open('data/qc-status.txt', 'w') as f:
                  f.write('valid' if all_valid else 'not valid')

              if not all_valid:
                  sys.exit(1)
          PYEOF
          python validate_ttl.py data/AOPWikiRDF.ttl data/AOPWikiRDF-Enriched.ttl data/AOPWikiRDF-Genes.ttl data/AOPWikiRDF-Void.ttl

      # Step 5b: Week-over-week gene/triple delta guard (QC-01)
      # Compares the freshly generated data/*.ttl against the PREVIOUS committed
      # version (HEAD~1) of those files. Syntax validation above cannot catch a
      # run that parses fine but silently lost gene associations (e.g. a BERN2
      # outage) or suffered a silent triple drop. This guard aborts the run --
      # and therefore the qc-status=valid commit in Step 6 -- if the
      # gene-association (edam:data_1025) count or the total-triple count drops
      # more than 5% vs the baseline. A non-zero exit fails the job (default
      # bash behavior; no continue-on-error). rdflib is installed in Step 3.
      #
      # The baseline is materialized from git history rather than from
      # production-rdf-backup/, which is NOT committed to the repo -- a fresh CI
      # checkout never had it, so the guard hard-failed every run on a missing
      # baseline (first such failure: weekly run on 2026-06-06). Using HEAD~1
      # gives a true week-over-week baseline with no large files in the repo and
      # no manual maintenance. Requires fetch-depth >= 2 on the checkout above.
      - name: Gene/triple delta guard vs previous commit
        run: |
          echo "=== Gene/triple delta guard (QC-01) ==="
          mkdir -p delta-baseline
          missing=false
          for f in AOPWikiRDF.ttl AOPWikiRDF-Genes.ttl; do
            if git cat-file -e "HEAD~1:data/$f" 2>/dev/null; then
              git show "HEAD~1:data/$f" > "delta-baseline/$f"
            else
              echo "No HEAD~1:data/$f in history; cannot establish a baseline."
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            echo "::warning::Skipping delta guard -- no previous data/ commit to compare against (first run?)."
            exit 0
          fi
          python scripts/qc_delta_guard.py --new-dir data/ --baseline-dir delta-baseline/ --drop-pct 0.05

      # Step 5c: Per-element coverage ratchet guard vs previous commit (XML-03).
      # The gene/total delta guard (Step 5b) cannot catch a silent drop in a
      # SPECIFIC fixed-gap predicate (e.g. evidence-collection-strategy) that is
      # small relative to the whole graph. This step counts each element's
      # predicate (from scripts/coverage-ratchet-baseline.json) in the new data/
      # vs the HEAD~1 baseline and applies the same relative floor. STRICT mode:
      # the guard runs in default (blocking) mode so a per-element coverage
      # regression FAILS the PR/push QC job (D-08 hard-fail posture). Reuses the
      # HEAD~1 baseline
      # materialization idiom of Step 5b; requires fetch-depth >= 2.
      - name: Per-element coverage ratchet guard vs previous commit
        run: |
          echo "=== Per-element coverage ratchet guard (XML-03) ==="
          mkdir -p delta-baseline
          missing=false
          for f in AOPWikiRDF.ttl AOPWikiRDF-Genes.ttl; do
            if git cat-file -e "HEAD~1:data/$f" 2>/dev/null; then
              git show "HEAD~1:data/$f" > "delta-baseline/$f"
            else
              echo "No HEAD~1:data/$f in history; cannot establish a baseline."
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            echo "::warning::Skipping per-element ratchet guard -- no previous data/ commit to compare against (first run?)."
            exit 0
          fi
          python scripts/qc_delta_guard.py --new-dir data/ --baseline-dir delta-baseline/ --coverage-baseline scripts/coverage-ratchet-baseline.json --drop-pct 0.05

      # Step 6: Commit and Push QC Status File to /data
      - name: Commit and Push QC Status
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/qc-status.txt
          # Commit iff qc-status.txt itself changed. Scope the guard to the
          # staged path -- an unrelated dirty file (e.g. the regenerated
          # qc-delta-report.json) must not trigger a commit with nothing staged,
          # which exits non-zero and fails the job.
          git diff --staged --quiet || (git commit -m "Update QC status" && git push)

name: RDF Generation

on:
  schedule:
    - cron: '0 8 * * 6'  # Runs every Saturday at 08:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # Step 1: Checkout repository
      - id: repo
        name: Repo Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Set up Python
      - id: python
        name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # Step 3: Cache pip dependencies
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      # Step 4: Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      # Step 5: Run Python Script for RDF conversion (Production)
      - id: python-conversion
        name: Python Script RDF Generation
        timeout-minutes: 90
        run: |
          echo "=== Running Python Script RDF Generation ==="
          echo "Start time: $(date -u)"
          
          # Run Python conversion script with production output.
          # --enable-bern2 adds BERN2 NER+EL gene enrichment; the warm
          # cache at data/cache/bern2/ means only changed KE descriptions
          # hit the network, so the weekly run stays within the time budget.
          python run_conversion.py --output-dir data/ --log-level INFO --enable-bern2
          
          echo "End time: $(date -u)"
          echo "Generated files:"
          ls -lh data/*.ttl 2>/dev/null || echo "No TTL files found in data/"
          
          # Display file sizes for monitoring
          echo "=== File Size Summary ==="
          for file in data/*.ttl; do
            if [ -f "$file" ]; then
              size=$(wc -c < "$file")
              lines=$(wc -l < "$file")
              echo "$(basename "$file"): $size bytes, $lines lines"
            fi
          done
        shell: bash

      # Step 6: Validate generated TTL files
      - name: Validate TTL Files
        run: |
          echo "=== TTL Validation ==="
          
          # Create validation script
          cat > validate_ttl.py << 'EOF'
          import sys
          from rdflib import Graph
          import os
          
          def validate_turtle(file_path):
              try:
                  g = Graph()
                  g.parse(file_path, format='turtle')
                  size = len(g)
                  print(f'✅ {file_path}: Valid ({size:,} triples)')
                  return True, size
              except Exception as e:
                  print(f'❌ {file_path}: Invalid - {e}')
                  return False, 0
          
          # Define expected files
          expected_files = [
              'data/AOPWikiRDF.ttl',
              'data/AOPWikiRDF-Enriched.ttl',
              'data/AOPWikiRDF-Genes.ttl',
              'data/AOPWikiRDF-Void.ttl'
          ]
          
          total_triples = 0
          all_valid = True
          
          for file_path in expected_files:
              if os.path.exists(file_path):
                  valid, triples = validate_turtle(file_path)
                  total_triples += triples
                  all_valid = all_valid and valid
              else:
                  print(f'❌ {file_path}: File not found')
                  all_valid = False
          
          print(f'\nTotal triples: {total_triples:,}')
          
          # Create QC status file for downstream workflows
          with open('data/qc-status.txt', 'w') as f:
              f.write('valid' if all_valid else 'not valid')
          
          if not all_valid:
              sys.exit(1)
          EOF
          
          python validate_ttl.py

      # Step 7: Remove AOP-Wiki XML Files
      - id: cleanup
        name: Remove AOP-Wiki XML Files
        run: |
          echo "=== Cleaning up XML files ==="
          rm -f data/aop-wiki-xml-*
          echo "Remaining files in data/:"
          ls -la data/ | head -10

      # Step 7b: Publish gate -- block degraded data from reaching master (QC-02)
      # The pipeline degrades BERN2 NER to regex when the BERN2 host is down
      # (ner_fallback_on_failure), which can silently halve gene associations.
      # Generation would otherwise commit that degraded output before the
      # post-commit QC delta guard ever runs. This gate compares the freshly
      # generated data/ against the CURRENTLY committed data (HEAD:data/, i.e.
      # last week's known-good) and FAILS the job BEFORE the commit step if the
      # gene-association or total-triple count drops more than 5%. On breach,
      # "Commit and Push" is skipped and master retains the good data until
      # BERN2 recovers. Reuses scripts/qc_delta_guard.py (rdflib is installed
      # in Step 4). HEAD:data/ is available at default fetch-depth.
      - name: Publish gate (delta vs current master)
        run: |
          echo "=== Publish gate (QC-02): new data/ vs committed HEAD:data/ ==="
          mkdir -p publish-baseline
          missing=false
          for f in AOPWikiRDF.ttl AOPWikiRDF-Genes.ttl; do
            if git cat-file -e "HEAD:data/$f" 2>/dev/null; then
              git show "HEAD:data/$f" > "publish-baseline/$f"
            else
              echo "No HEAD:data/$f committed; cannot gate on it."
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            echo "::warning::Skipping publish gate -- no committed baseline (first run?)."
            exit 0
          fi
          python scripts/qc_delta_guard.py --new-dir data/ --baseline-dir publish-baseline/ --drop-pct 0.05
          rm -rf publish-baseline

      # Step 8: Check if there are changes
      - id: check_changes
        name: Check for Changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            echo "CHANGES=false" >> $GITHUB_ENV
          else
            echo "Changes detected."
            echo "CHANGES=true" >> $GITHUB_ENV
          fi

      # Step 9: Commit and Push Changes (only if there are changes)
      - id: commit
        name: Commit and Push Changes
        if: env.CHANGES == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A

          commit_msg="Weekly RDF update (Python script generation)"

          git commit -m "$commit_msg"
          git push origin HEAD
          
          echo "✅ Changes committed and pushed"

      # Step 10: Upload RDF artifacts
      - name: Upload RDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rdf-files
          path: |
            data/*.ttl
            data/qc-status.txt
            *.log
          retention-days: 30

      # Step 11: Execution Summary
      - name: Execution Summary
        run: |
          echo "=== RDF Generation Summary ==="
          echo "Date: $(date -u)"
          echo "Method: Python script (enhanced precision)"
          echo "Changes Committed: ${{ env.CHANGES }}"
          echo ""
          echo "Generated files:"
          ls -lh data/*.ttl 2>/dev/null || echo "No TTL files"
          echo ""
          echo "QC Status: $(cat data/qc-status.txt 2>/dev/null || echo 'unknown')"
          echo ""
          echo "✅ RDF generation completed successfully"

      # Step 12: Clean up temporary files
      - name: Final Cleanup
        run: |
          rm -f validate_ttl.py
          rm -f *.log 2>/dev/null || true